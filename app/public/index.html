<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #dbeafe, #e0e7ff, #f5d0fe);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 8px;
      color: #1e293b;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 28px;
      font-size: 16px;
    }

    .input-section {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    input {
      flex: 1;
      padding: 15px 18px;
      border: 2px solid #dbeafe;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
      background: #f8fafc;
    }

    input:focus {
      border-color: #6366f1;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }

    button {
      padding: 15px 22px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 18px rgba(99, 102, 241, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(99, 102, 241, 0.35);
    }

    h2 {
      color: #1e293b;
      margin-bottom: 16px;
      font-size: 28px;
    }

    #notesList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #notesList li {
      background: #ffffff;
      border-left: 6px solid #6366f1;
      padding: 16px 18px;
      border-radius: 14px;
      font-size: 17px;
      color: #334155;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
      transition: 0.3s;
      word-break: break-word;
    }

    #notesList li:hover {
      transform: translateX(4px);
    }

    .empty-state {
      text-align: center;
      color: #94a3b8;
      padding: 18px;
      background: #f8fafc;
      border-radius: 14px;
      border: 1px dashed #cbd5e1;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 32px;
      }

      .input-section {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Notes App</h1>
    <p class="subtitle">Write, save, and view your important notes easily</p>

    <div class="input-section">
      <input type="text" id="noteInput" placeholder="Enter your note here..." />
      <button onclick="addNote()">Add Note</button>
    </div>

    <h2>Saved Notes</h2>
    <ul id="notesList"></ul>
  </div>

  <script>
    async function fetchNotes() {
      const res = await fetch("/notes");
      const notes = await res.json();
      const list = document.getElementById("notesList");
      list.innerHTML = "";

      if (notes.length === 0) {
        list.innerHTML = '<div class="empty-state">No notes yet. Add your first note.</div>';
        return;
      }

      notes.forEach(note => {
        const li = document.createElement("li");
        li.textContent = note.text;
        list.appendChild(li);
      });
    }

    async function addNote() {
      const input = document.getElementById("noteInput");
      const text = input.value.trim();

      if (!text) return;

      await fetch("/notes", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      input.value = "";
      fetchNotes();
    }

    fetchNotes();
  </script>
</body>
</html>
